name: AI HOT Daily

on:
  schedule:
    - cron: '30 21 * * *'  # UTC 21:30 = 北京次日 05:30
  workflow_dispatch:

concurrency:
  group: aihot-daily
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate & send AI HOT brief
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python brief.py
