name: AI HOT Daily

on:
  workflow_dispatch:  # 唯一入口:Cloudflare cron 每天北京05:30 通过 API 触发；GitHub 自带 schedule 已移除(延迟严重且与 CF 重复触发)

concurrency:
  group: aihot-daily
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate & send AI HOT brief
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python brief.py
